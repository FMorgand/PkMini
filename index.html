<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PkMini — Table des types</title>
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
  <header>
    <h1>Pk<span>Mini</span></h1>
    <p>Apprends la table des types Pokémon (Gen 6+)</p>
  </header>

  <main>
    <div id="phase-indicator">
      <div class="phase-header">
        <span id="phase-number"></span>
        <h2><span id="phase-symbol"></span> — <span id="phase-label"></span></h2>
      </div>
      <p id="phase-instruction"></p>
    </div>

    <div class="table-wrapper">
      <table id="type-table"></table>
    </div>

    <div class="game-actions">
      <button id="validate-btn">Valider la phase</button>
    </div>
  </main>

  <script src="js/data.js?v=4"></script>
  <script src="js/game.js?v=4"></script>
  <script src="js/render.js?v=4"></script>
</body>
</html>
