<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PkMini — Table des types</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Pk<span>Mini</span></h1>
    <p>Apprends la table des types Pokémon (Gen 6+)</p>
  </header>

  <main>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-swatch" style="background:#1a5c1a; color:#aaffaa;">2</div>
        <span>Super efficace (×2)</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#7a1e1e; color:#ffaaaa;">½</div>
        <span>Peu efficace (×½)</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#111; color:#555;">✕</div>
        <span>Aucun effet (×0)</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#16213e;"></div>
        <span>Normal (×1)</span>
      </div>
    </div>

    <div class="table-wrapper">
      <table id="type-table"></table>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
</body>
</html>
